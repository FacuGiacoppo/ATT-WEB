<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Base del sitio + URL absoluta para módulos (GitHub Pages /nombre-repo/). -->
    <script>
      (function () {
        try {
          if (location.protocol === "file:") return;
          var parts = location.pathname.split("/").filter(Boolean);
          if (parts.length && /\.html?$/i.test(parts[parts.length - 1])) parts.pop();
          var href = parts.length ? "/" + parts.join("/") + "/" : "/";
          window.__ATT_SITE_BASE__ = location.origin + href;
          var b = document.createElement("base");
          b.href = href;
          var ch = document.querySelector("meta[charset]");
          if (ch) ch.after(b);
          else document.head.prepend(b);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ESTUDIO-ATT</title>
    <!-- Subí el número en ?v= para forzar recarga de CSS/JS (cache bust) -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/styles/base.css?v=20260330-13" />
    <link rel="stylesheet" href="./src/styles/layout.css?v=20260330-13" />
    <link rel="stylesheet" href="./src/styles/requerimientos.css?v=20260330-13" />
    <link rel="stylesheet" href="./src/styles/clientes.css?v=20260330-13" />
    <link rel="stylesheet" href="./src/styles/operaciones.css?v=20260402-9" />
    <link rel="stylesheet" href="./src/styles/estado-resultados.css?v=20260402-7" />
    <link rel="stylesheet" href="./src/styles/reporte-tiempos.css?v=20260403-2" />
  </head>
  <body>
    <div id="app"></div>

    <!-- SheetJS import; ExcelJS plantilla con listas desplegables (Central de operaciones) -->
    <!-- async: no bloquean el arranque de la app; ExcelJS/SheetJS se usan al importar/descargar plantilla -->
    <script async src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <!-- MSAL (Microsoft login) para enviar emails por Graph -->
    <script defer src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>

    <!-- URL absoluta: en Pages ./src/main.js a veces devolvía HTML (Unexpected token '<'). -->
    <script>
      (function () {
        var v = "20260402-10";
        var base = window.__ATT_SITE_BASE__;
        var src = base
          ? new URL("src/main.js?v=" + v, base).href
          : "./src/main.js?v=" + v;
        var sc = document.createElement("script");
        sc.type = "module";
        sc.src = src;
        sc.onerror = function () {
          var app = document.getElementById("app");
          if (!app) return;
          app.innerHTML =
            '<section class="page-section boot-fatal"><h1 class="boot-fatal-title">No se pudo cargar main.js</h1>' +
            "<p class=\"boot-fatal-hint\">Probá abrir esta URL en una pestaña nueva (debería verse código JavaScript, no HTML):</p>" +
            "<pre class=\"boot-fatal-pre\">" +
            String(src).replace(/</g, "&lt;") +
            "</pre></section>";
        };
        document.body.appendChild(sc);
      })();
    </script>
  </body>
</html>
